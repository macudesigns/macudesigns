  /*
  =================================================================
  --- ESTILOS PARA LA GALERÍA ---
  =================================================================
  */
  .gallery-section{
    padding: 150px;
    position: relative; /* Necesario para el título vertical */
  }

  .grid-layout {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    grid-gap: 10px;
    grid-auto-rows: minmax(180px, auto);
    grid-auto-flow: dense;
  }

  .grid-item {
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    color: #000;
    background-color: #ccc;
    border-radius: 30px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.4s, transform 0.4s, box-shadow 0.4s;
  }

  .grid-item:hover {
    transform: scale(1.04) !important;
    z-index: 2;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    cursor: pointer;
    transition: transform 0.5s ;
  }

  .grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 30px;
    display: block;
  }

  .grid-item.animate-in {
    animation: fadeInUp 0.6s ease forwards;
  }

  .span-2 {
    grid-column-end: span 2;
    grid-row-end: span 2;
  }

  .span-3 {
    grid-column-end: span 3;
    grid-row-end: span 4;
  }

  @keyframes fadeInUp {
    0% {
      opacity: 0;
      transform: translateY(30px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 1024px) {
    .gallery-section {
      padding: 80px;
    }
    .grid-layout {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      grid-gap: 8px;
    }
  }

  @media (max-width: 600px) {
    .gallery-section {
      padding: 50px;
    }
    .grid-layout {
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      grid-gap: 5px;
    }
    .span-2, .span-3 {
      grid-column-end: span 2;
      grid-row-end: span 2;
    }
  }

  =================================================================
  --- ESTILOS GLOBALES Y COMPONENTES REUTILIZABLES ---
  =================================================================
  */

  .cover h1 {

  .cover-video {

      left: 50%;

  }
  .cover-overlay {

      top: 0;
      left: 0;
      width: 100%;

      background-color: rgba(0, 0, 0, 0.6);
      z-index: 2;

  .cover article {

  =================================================================

  .footer-content-wrapper {

      align-items: center;
      text-align: center;
      position: relative;
      z-index: 5;

  .footer-content-wrapper > img {

  .footer-primary-contact {

  }
  #fullscreen-menu.open {
      opacity: 1;
      visibility: visible;
  }
  .menu-content-wrapper {

      flex-direction: column;
      align-items: center;
      gap: 50px;
  }
  .menu-logo {

      transform: translateY(25px);

  }
  .menu-logo img {

  }

  }

          const menuOverlay = document.getElementById('fullscreen-menu');
          const menuIcon = menuButton.querySelector('i');
          const body = document.body;

          if (menuButton && menuOverlay && menuIcon && closeMenuButton) {
              const toggleMenu = () => {
                  body.classList.toggle('menu-open');
                  menuOverlay.classList.toggle('open');
              };

              menuButton.addEventListener('click', function(e) {
                  e.preventDefault();
                  toggleMenu();
              });

              closeMenuButton.addEventListener('click', function(e) {
                  e.preventDefault();
                  toggleMenu();
              });

              menuOverlay.querySelectorAll('a').forEach(link => {
                  link.addEventListener('click', () => {
                      if (menuOverlay.classList.contains('open')) {
                          toggleMenu();
                      }
                  });
              });

              document.addEventListener('keydown', function(e) {
                  if (e.key === "Escape" && menuOverlay.classList.contains('open')) {
                      toggleMenu();
                  }
              });
          }
          
          // --- SCRIPT PARA LA GALERÍA ---
          const gridItems = document.querySelectorAll(".grid-item");
          const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach((entry, index) => {
              if (entry.isIntersecting) {
                setTimeout(() => {
                  entry.target.classList.add("animate-in");
                }, index * 100);
                observer.unobserve(entry.target);
              }
            });
          }, {
            threshold: 0.1
          });

          gridItems.forEach((item) => {
            observer.observe(item);
          });

          const lightbox = document.getElementById('lightbox-overlay');
          const lightboxImg = document.getElementById('lightbox-img');
          const lightboxClose = document.getElementById('lightbox-close');

          gridItems.forEach(item => {
            item.addEventListener('click', function() {
              const imgSrc = this.getAttribute('data-img');
              if (imgSrc) {
                lightboxImg.src = imgSrc;
                lightbox.style.display = 'flex';
              }
            });
          });

          lightboxClose.addEventListener('click', function() {
            lightbox.style.display = 'none';
            lightboxImg.src = '';
          });

          lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
              lightbox.style.display = 'none';
              lightboxImg.src = '';
            }
          });

          // --- SCRIPT PARA ACTUALIZAR AÑO DEL COPYRIGHT ---
          const yearSpan = document.getElementById("copyright-year");
          if(yearSpan) {
            yearSpan.textContent = new Date().getFullYear();
          }
      });
    </script>
  </body>
</html>
